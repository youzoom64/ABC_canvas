<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ABC Canvas Settings</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/static/style.css?v=arrange-settings-1" />
  </head>
  <body class="settings-page">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <span>ABC Canvas Settings</span>
      </div>
      <div class="filebar">
        <button id="settingsBackButton" type="button">Back</button>
        <button id="settingsProjectButton" type="button">Projects</button>
      </div>
    </header>

    <main class="settings-shell">
      <section class="settings-board" aria-label="ABC Canvas settings">
        <div class="settings-title">
          <h1>設定</h1>
          <p>会話で鳴らす音は、指定したサウンドフォルダの中から選ぶ。</p>
        </div>

        <section class="settings-section">
          <div class="settings-section-head">
            <h2>サウンドフォルダ</h2>
            <span id="defaultSoundFolder" class="settings-muted"></span>
          </div>
          <div class="settings-folder-row">
            <input id="soundFolderInput" type="text" autocomplete="off" spellcheck="false" />
            <button id="browseSoundFolderButton" type="button">Browse...</button>
            <button id="saveSoundFolderButton" type="button">Save Folder</button>
            <button id="refreshSoundButton" type="button">Refresh</button>
          </div>
        </section>

        <section class="settings-section">
          <div class="settings-section-head">
            <h2>会話サウンド</h2>
            <span class="settings-muted">AIの返事が流れている間に鳴る音</span>
          </div>
          <div class="settings-sound-row">
            <select id="settingsSoundSelect">
              <option value="">なし</option>
            </select>
            <button id="saveConversationSoundButton" type="button">Save Sound</button>
          </div>
        </section>

        <section class="settings-section">
          <div class="settings-section-head">
            <h2>音量</h2>
            <span id="soundVolumeValue" class="settings-muted">55%</span>
          </div>
          <div class="settings-volume-row">
            <input id="soundVolumeInput" type="range" min="0" max="1" step="0.01" />
            <button id="saveSoundVolumeButton" type="button">Save Volume</button>
          </div>
        </section>

        <section class="settings-section">
          <div class="settings-section-head">
            <h2>入力中サウンド</h2>
            <span class="settings-muted">AIの返事を待っている間に鳴る音</span>
          </div>
          <div class="settings-sound-row">
            <select id="settingsInputSoundSelect">
              <option value="">なし</option>
            </select>
            <button id="saveInputSoundButton" type="button">Save Sound</button>
          </div>
        </section>

        <section class="settings-section">
          <div class="settings-section-head">
            <h2>入力中音量</h2>
            <span id="inputSoundVolumeValue" class="settings-muted">55%</span>
          </div>
          <div class="settings-volume-row">
            <input id="inputSoundVolumeInput" type="range" min="0" max="1" step="0.01" />
            <button id="saveInputSoundVolumeButton" type="button">Save Volume</button>
          </div>
        </section>

        <section class="settings-section">
          <div class="settings-section-head">
            <h2>Codex権限</h2>
            <span class="settings-muted">ポワンと話す時のCodex実行権限</span>
          </div>
          <div class="settings-sound-row">
            <select id="codexSandboxSelect">
              <option value="danger-full-access">フルアクセス</option>
              <option value="workspace-write">ワークスペース書き込み</option>
              <option value="read-only">読み取り専用</option>
            </select>
            <button id="saveCodexSandboxButton" type="button">Save Access</button>
          </div>
        </section>

        <section class="settings-section">
          <div class="settings-section-head">
            <h2>整列</h2>
            <span class="settings-muted">整列ボタンと右クリック整列で使う並べ方</span>
          </div>
          <p class="settings-help">整列は、世界または親ポワンの中心を基準に、配下のポワンを放射状に並べ直します。</p>
          <div class="settings-check-row">
            <label><input id="arrangeResizeParentsInput" type="checkbox" /> 親ポワンの大きさを広げる <span class="settings-inline-help">子が入りきらない時に親ポワンも大きくする</span></label>
            <label><input id="arrangeRecursiveInput" type="checkbox" /> 配下も全て整列 <span class="settings-inline-help">見えている階層の下にある子ポワンも並べ直す</span></label>
          </div>
          <div class="settings-action-row">
            <button id="saveArrangeButton" type="button">Save Arrange Checks</button>
          </div>
        </section>

        <section class="settings-section">
          <div class="settings-section-head">
            <h2>CMDログ</h2>
            <span class="settings-muted">起動CMDへ表示するログレベル</span>
          </div>
          <div class="settings-check-row" id="consoleLogLevelInputs">
            <label><input type="checkbox" value="trace" /> trace</label>
            <label><input type="checkbox" value="debug" /> debug</label>
            <label><input type="checkbox" value="info" /> info</label>
            <label><input type="checkbox" value="warn" /> warn</label>
            <label><input type="checkbox" value="error" /> error</label>
            <label><input type="checkbox" value="fatal" /> fatal</label>
          </div>
          <div class="settings-action-row">
            <button id="saveConsoleLogLevelsButton" type="button">Save CMD Logs</button>
          </div>
        </section>

        <div id="settingsStatus" class="settings-status">ready</div>
      </section>
    </main>

    <script src="/static/settings.js?v=wide-arrange-range-1"></script>
  </body>
</html>
